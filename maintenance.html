<!doctype html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>تعمیرات - سیستم مدیریت موتور سکیل ها</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <link rel="stylesheet" href="./global.css">
</head>
<body class="h-screen bg-gray-950 text-white">

<div id="loading-overlay" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.65); z-index: 9999; justify-content: center; align-items: center; flex-direction: column; color: white; font-size: 1rem;">
  <div class="motorbike-loader">
    <div class="bike">
      <img class="small-img" src="https://i.ibb.co/kgFcnCHj/emojis-com-a-motor-bike-rideng-emoji.png" alt="loader-bike">
    </div>
    <div class="smoke smoke1">💨</div>
    <div class="smoke smoke2">🌫️</div>
  </div>
  <p style="margin: 10px 0 0; font-weight: bold; text-shadow: 0 0 10px rgba(255,255,255,0.5);">
    در حال بارگذاری...
  </p>
</div>

<div class="h-screen p-6">
  <!-- هدر -->
  <div class="card p-6 mb-6" id="header-section">
    <div class="flex items-center justify-between">
      <div class="flex items-center gap-4">
        <div class="motorcycle-icon">🔧</div>
        <div>
          <h1 class="text-3xl font-bold text-white">تعمیرات</h1>
          <p class="text-gray-300 mt-1">پارکینگ جلال آباد</p>
        </div>
      </div>
      <div class="text-left">
        <p class="text-sm text-gray-300">تاریخ</p>
        <p id="current-date" class="text-lg font-bold text-white"></p>
      </div>
    </div>
  </div>

  <div class="card p-6">
    <div class="flex items-center justify-between mb-6">
      <button class="btn btn-secondary" onclick="navigateTo('./index.html')">← بازگشت به داشبورد</button>
    </div>

    <h3 class="text-xl font-bold mb-6 text-center">انتخاب بخش را انتخاب کنید</h3>
    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
      <div onclick="navigateTo('./maintenance-feedback.html')" class="card p-8 text-center cursor-pointer hover:bg-amber-900/30 border border-amber-500/30 rounded-xl transition-all duration-300">
        <div class="text-6xl mb-4">🗣️</div>
        <h3 class="font-bold text-xl">نظریات</h3>
        <p class="text-sm text-gray-200 mt-2">ثبت نظریات و پیشنهادات</p>
      </div>
      <div onclick="navigateTo('./maintenance-mobile.html')" class="card p-8 text-center cursor-pointer hover:bg-amber-900/30 border border-amber-500/30 rounded-xl transition-all duration-300">
        <div class="text-6xl mb-4">🛢️</div>
        <h3 class="font-bold text-xl">موبلایل موتور سکیل ها</h3>
        <p class="text-sm text-gray-200 mt-2">مدیریت موبلایل موتور سکیل‌ها</p>
      </div>
    </div>
  </div>
</div>

<div id="toast" class="toast">
  <span id="toast-icon" class="text-2xl">✅</span>
  <span id="toast-message" class="font-medium">پیام موفقیت</span>
</div>

<script src="./googleSheets.js"></script>
<script src="./index.js"></script>
<script src="./maintenance.js"></script>
</body>
</html>
